title: "The Empathy Advantage"
authors: ["Various"]
key_insights:
  - "Empathy is not agreement - it's understanding someone's experience without losing your own perspective"
  - "The people most affected by a system should have the most say in its design"
  - "Listening for what isn't said is as important as listening to what is said"
  - "Trust is built through consistent small actions, not grand promises"

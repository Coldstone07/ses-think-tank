title: "Zero to One"
authors: ["Peter Thiel"]
key_insights:
  - "Competition is for losers - monopolies innovate, competition erodes margins"
  - "Every great company is built on a technology that's 10x better than the alternative"
  - "The most valuable companies create something new rather than copying what exists"
  - "Distribution is as important as the product - the best product loses if no one finds it"

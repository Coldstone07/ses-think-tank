title: "Thinking, Fast and Slow"
authors: ["Daniel Kahneman"]
key_insights:
  - "System 1 (fast) thinking creates coherent stories from limited data - we confuse narrative coherence with truth"
  - "Loss aversion: losses loom larger than gains, which shapes all decision-making"
  - "The planning fallacy: we systematically underestimate costs and overestimate benefits of our plans"
  - "Anchoring: initial exposure to a number biases all subsequent estimates"

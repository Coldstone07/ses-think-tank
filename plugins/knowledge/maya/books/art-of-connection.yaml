title: "The Art of Connection"
authors: ["Various"]
key_insights:
  - "Patterns are everywhere - the same structures appear in biology, language, and social systems"
  - "Metaphor is not decoration - it's how we think. The metaphors we choose shape what we can see"
  - "Synthesis happens at the intersection of seemingly unrelated domains"
  - "The map is not the territory - every model is a lossy compression of reality"

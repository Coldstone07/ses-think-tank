title: "The Right Thing to Do"
authors: ["James Rachels", "Stuart Rachels"]
key_insights:
  - "Utilitarianism asks: what maximizes overall well-being? But whose well-being counts?"
  - "Deontology asks: what duties do we owe regardless of consequences?"
  - "Virtue ethics asks: what would a wise person do in this situation?"
  - "Real ethical dilemmas are conflicts between competing goods, not good vs evil"
  - "The precautionary principle: when harm is irreversible, err on the side of caution"
